default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ── Lint & format ────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Tests & commit-msg rules ─────────────────────────────────────────────
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit tests)
        entry: python scripts/run_unit_tests.py
        language: system
        pass_filenames: false
        always_run: true

      - id: no-ai-tool-names
        name: "No AI tool names in commit message"
        language: pygrep
        entry: '(?i)\b(cursor|claude|chatgpt|gpt-?[0-9o]|copilot|openai|anthropic|gemini|mistral)\b'
        stages: [commit-msg]
